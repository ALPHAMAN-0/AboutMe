<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Automation — scripts, pipelines and bots">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EAF0FF"/>
      <stop offset="1" stop-color="#F5F3EE"/>
    </linearGradient>
    <pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#C9D3F2" opacity="0.55"/>
    </pattern>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#1F44E0" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="320" height="200" fill="url(#bg)"/>
  <rect width="320" height="200" fill="url(#dots)"/>

  <!-- automation badge -->
  <g filter="url(#shadow)">
    <rect x="118" y="38" width="84" height="84" rx="20" fill="#1F44E0"/>
  </g>

