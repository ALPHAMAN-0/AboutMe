<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Phoenix">
  <defs>
    <linearGradient id="flame" gradientUnits="userSpaceOnUse" x1="32" y1="4" x2="32" y2="62">
      <stop offset="0" stop-color="#F7B73E"/>
      <stop offset="0.5" stop-color="#EE6C1F"/>
      <stop offset="1" stop-color="#A81E0C"/>
    </linearGradient>
  </defs>

  <g fill="url(#flame)" stroke="#7A1606" stroke-width="0.8" stroke-linejoin="round" stroke-linecap="round">
    <!-- WINGS (back) -->
    <path id="wing" d="M32 27 C41 15 51 10 60 11 C55 14 52 16 50 17 C54 18 57 20 59 22 C52 23 48 25 47 27 C52 28 55 30 56 32 C49 33 44 35 43 37 C40 35 34 32 32 27 Z"/>
    <use href="#wing" transform="matrix(-1,0,0,1,64,0)"/>

    <!-- FLAME TAIL (long, flowing) -->
    <path d="M32 40 C29 47 30 55 33 62 C36 55 35 47 33 41 Z"/>
    <path d="M29 41 C24 47 24 55 27 60 C30 55 30 48 31 43 Z"/>
    <path d="M35 41 C40 47 40 55 37 60 C34 55 34 48 33 43 Z"/>
    <path d="M26 42 C22 47 22 52 24 56 C26 52 27 47 28 44 Z"/>
    <path d="M38 42 C42 47 42 52 40 56 C38 52 37 47 36 44 Z"/>

    <!-- BODY / BREAST -->
    <path d="M32 21 C37 23 38 31 36 38 C35 43 33 46 32 47 C31 46 29 43 28 38 C26 31 27 23 32 21 Z"/>

    <!-- NECK + HEAD (profile, facing right) -->
    <path d="M30 24 C29 19 30 15 34 13 C33 17 33 20 34 23 Z"/>
    <circle cx="35.5" cy="12.5" r="4.4"/>
    <!-- crest plumes sweeping back -->
    <path d="M33 9 C30 5 27 4 25 4 C28 6 29 8 31 10 Z"/>
    <path d="M34 8 C32 4 30 2 28 2 C30 4 31 6 32 9 Z"/>
    <!-- beak -->
    <path d="M39 11 L45 11.5 L39 14.5 Z" fill="#F7C24A"/>
  </g>

  <!-- eye -->
  <circle cx="35.6" cy="12" r="1.15" fill="#3A0A02"/>
</svg>
